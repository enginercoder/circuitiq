name: Build CircuitIQ APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      # Decode keystore from secret
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/circuitiq.jks

      # Build release APK
      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: circuitiq.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # Rename APK
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/CircuitIQ.apk

      # Upload release APK
      - uses: actions/upload-artifact@v4
        with:
          name: CircuitIQ-Release-APK
          path: app/build/outputs/apk/release/CircuitIQ.apk
          retention-days: 90
